<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #1e293b, #0f172a); min-height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; }
        .cell { width: 40px; height: 40px; border: 2px solid #38bdf8; background: rgba(255,255,255,0.05); text-align: center; font-weight: bold; color: white; }
        .cell:focus { background: #38bdf8; outline: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="max-w-md w-full">
        <h1 class="text-3xl font-black text-cyan-400 mb-2 text-center">CRUZADINHA A1</h1>
        <p class="text-center mb-6 text-white/60">Ajude sua sobrinha a aprender novas palavras!</p>

        <div class="glass-panel">
            <div class="grid grid-cols-5 gap-1 justify-center mb-8">
                <div class="col-start-2"><input type="text" class="cell" maxlength="1"></div>
                <div class=""><input type="text" class="cell" maxlength="1"></div>
                <div class=""><input type="text" class="cell" maxlength="1"></div>
                <div class=""><input type="text" class="cell" maxlength="1"></div>
                <div class=""><input type="text" class="cell" maxlength="1"></div>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-cyan-300">Dicas:</h3>
                <p class="text-sm">1. Horizontal: O animal que faz "miau".</p>
                <p class="text-sm">2. Vertical: O que usamos para escrever.</p>
                
                <button class="w-full bg-cyan-600 py-3 rounded-xl font-bold mt-4 hover:bg-cyan-500 transition">Verificar Respostas</button>
            </div>
        </div>
    </div>

</body>
</html>
