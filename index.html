<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fce4ec; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Comic Sans MS', cursive; overflow: hidden; }
        .barbie-card { background: #fff0f5; border: 4px solid #ec4899; border-radius: 30px; padding: 20px; width: 100%; height: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
        .letter-box { width: 40px; height: 50px; border: 3px solid #ec4899; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #db2777; background: white; margin: 2px; }
        .key { background: #fbcfe8; padding: 8px 4px; border-radius: 8px; font-weight: bold; color: #9d174d; cursor: pointer; border: 2px solid #ec4899; font-size: 13px; text-align: center; }
        .key:active { transform: scale(0.9); background: #ec4899; color: white; }
    </style>
</head>
<body>

<div class="barbie-card">
    <h1 class="text-xl font-black text-pink-600 mb-2">FORÇA MÁGICA</h1>
    <div id="diamonds" class="flex gap-1 mb-2 text-xl"></div>
    
    <button onclick="mostrarDica()" class="bg-yellow-400 text-white px-6 py-2 rounded-full font-bold text-sm shadow-md mb-2 border-2 border-white">DICA ✨</button>
    <div id="hint-text" class="text-pink-700 font-bold mb-4 h-6 text-center text-sm"></div>
    
    <div id="word-display" class="flex justify-center mb-6 flex-wrap"></div>
    <div id="keyboard" class="grid grid-cols-7 gap-1 w-full"></div>
</div>

<script>
    const bancoDePalavras = [
        {p: "BONECA", d: "Um brinquedo que muitas meninas adoram."},
        {p: "CASTELO", d: "Onde as princesas moram."},
        {p: "ESTRELA", d: "Brilha no céu à noite."},
        {p: "ESCOLA", d: "Lugar onde aprendemos coisas novas."},
        {p: "GLITTER", d: "Pó que brilha muito!"}
    ];

    let atual = {};
    let acertos = [];
    let vidas = 5;

    function carregarJogo() {
        vidas = 5;
        document.getElementById('hint-text').innerText = "";
        atual = bancoDePalavras[Math.floor(Math.random() * bancoDePalavras.length)];
        acertos = Array(atual.p.length).fill("_");
        render();
    }

    function mostrarDica() {
        document.getElementById('hint-text').innerText = "Dica: " + atual.d;
    }

    function render() {
        const wordContainer = document.getElementById('word-display');
        wordContainer.innerHTML = '';
        acertos.forEach((letra, i) => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            box.innerText = letra;
            box.onclick = () => { acertos[i] = "_"; render(); };
            wordContainer.appendChild(box);
        });
        document.getElementById('diamonds').innerText = '💎'.repeat(vidas);
    }

    function processarLetra(letra) {
        if (vidas <= 0) return;

        if (atual.p.includes(letra)) {
            atual.p.split('').forEach((l, i) => { if(l === letra) acertos[i] = letra; });
        } else {
            vidas--;
        }
        
        render();

        if (!acertos.includes("_")) {
            setTimeout(() => {
                alert("✨ Parabéns! Você acertou: " + atual.p);
                carregarJogo();
            }, 100);
        } else if(vidas === 0) {
            setTimeout(() => {
                alert("Acabaram os diamantes! A palavra era: " + atual.p);
                carregarJogo();
            }, 100);
        }
    }

    const kb = document.getElementById('keyboard');
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
        const btn = document.createElement('div');
        btn.className = 'key';
        btn.innerText = l;
        btn.onclick = () => processarLetra(l);
        kb.appendChild(btn);
    });

    carregarJogo();
</script>
</body>
</html>
