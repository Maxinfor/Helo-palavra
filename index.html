<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fce4ec; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Comic Sans MS', cursive; overflow: hidden; }
        .barbie-card { background: #fff0f5; border: 4px solid #ec4899; border-radius: 30px; padding: 20px; width: 100%; height: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
        .letter-box { width: 40px; height: 50px; border: 3px solid #ec4899; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #db2777; background: white; margin: 2px; }
        .key { background: #fbcfe8; padding: 8px 4px; border-radius: 8px; font-weight: bold; color: #9d174d; cursor: pointer; border: 2px solid #ec4899; font-size: 13px; text-align: center; }
        .key:active { transform: scale(0.9); background: #ec4899; color: white; }
    </style>
</head>
