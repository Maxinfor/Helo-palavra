    <script src="https://cdn.tailwindcss.com"></script>

        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            height: 100vh; overflow: hidden; /* Garante que a tela não mexa */
            display: flex; align-items: center; justify-content: center; font-family: 'Arial Rounded MT Bold', sans-serif;
        }
        .app-card { 
            background: rgba(255, 255, 255, 0.95); width: 90%; max-width: 400px;
            border-radius: 30px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);

        }
        .key { background: #edf2f7; border: 3px solid #cbd5e0; border-radius: 12px; padding: 10px; font-weight: bold; }

        <pre id="hangman-draw"></pre>
        <p id="hint" class="font-bold text-blue-600 mb-4 bg-blue-50 p-2 rounded-xl"></p>
        <div id="word-display" class="text-3xl font-bold tracking-[8px] mb-4 text-purple-800"></div>

        <div class="flex gap-2 mb-4">
