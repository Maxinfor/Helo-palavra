<html lang="pt-BR">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fce4ec; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Arial', sans-serif; overflow: hidden; }
        .barbie-card { background: #fff0f5; border: 4px solid #ec4899; border-radius: 30px; padding: 20px; width: 100%; height: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
        .letter-box { width: 35px; height: 45px; border: 3px solid #ec4899; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #db2777; background: white; margin: 2px; }
        .key { background: #fbcfe8; padding: 6px 2px; border-radius: 6px; font-weight: bold; color: #9d174d; cursor: pointer; border: 2px solid #ec4899; font-size: 14px; text-align: center; }
        .key:active { transform: scale(0.9); background: #ec4899; color: white; }
    </style>
</head>

    <div id="word-display" class="flex justify-center mb-6 flex-wrap"></div>
    <div id="keyboard" class="grid grid-cols-7 gap-1 w-full"></div>
</div>
