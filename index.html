<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fce4ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Comic Sans MS', cursive; }
        .barbie-card { background: #fff0f5; border: 4px solid #ec4899; border-radius: 40px; padding: 25px; width: 90%; max-width: 400px; box-shadow: 0 0 20px #f472b6; }
        .letter-box { width: 50px; height: 60px; border: 3px solid #ec4899; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #db2777; background: white; cursor: pointer; }
        .key { background: #fbcfe8; padding: 10px; border-radius: 12px; font-weight: bold; color: #9d174d; cursor: pointer; border: 2px solid #ec4899; }
        .key:active { transform: scale(0.95); background: #ec4899; color: white; }
    </style>
</head>
<body>

<div class="barbie-card">
    <h1 class="text-2xl font-black text-pink-600 text-center mb-4">FORÇA MÁGICA</h1>
    
    <!-- Contador de Diamantes -->
    <div id="diamonds" class="flex justify-center gap-2 mb-6 text-2xl">💎💎💎💎💎</div>
    
    <!-- Palavra sendo formada -->
    <div id="word-display" class="flex justify-center gap-2 mb-6">
        <!-- As caixinhas de letra geradas aqui -->
    </div>

    <!-- Teclado Barbie -->
    <div id="keyboard" class="grid grid-cols-7 gap-2"></div>
</div>

<script>
    const palavra = "GLITTER"; // Exemplo
    let tentativa = ["G", "_", "_", "_", "_", "_"]; // Lógica de preenchimento

    // Função para renderizar as caixas de letra
    function renderWord() {
        const container = document.getElementById('word-display');
        container.innerHTML = '';
        palavra.split('').forEach((letra, index) => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            box.innerText = tentativa[index];
            // Se clicar na caixa, ela limpa para corrigir
            box.onclick = () => { tentativa[index] = "_"; renderWord(); };
            container.appendChild(box);
        });
    }

    // Inicializar
    renderWord();
    
    // Gerar teclado (simplificado)
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const kb = document.getElementById('keyboard');
    letras.forEach(l => {
        const btn = document.createElement('div');
        btn.className = 'key text-center';
        btn.innerText = l;
        btn.onclick = () => alert("Adicionando letra: " + l);
        kb.appendChild(btn);
    });
</script>
</body>
</html>
