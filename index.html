<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fce4ec; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Comic Sans MS', cursive; overflow: hidden; }
        .barbie-card { background: #fff0f5; border: 4px solid #ec4899; border-radius: 30px; padding: 20px; width: 100%; height: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
        .letter-box { width: 45px; height: 55px; border: 3px solid #ec4899; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: #db2777; background: white; }
        .key { background: #fbcfe8; padding: 10px 5px; border-radius: 8px; font-weight: bold; color: #9d174d; cursor: pointer; border: 2px solid #ec4899; font-size: 14px; text-align: center; }
        .key:active { transform: scale(0.9); background: #ec4899; color: white; }
    </style>
</head>
<body>

<div class="barbie-card">
    <h1 class="text-2xl font-black text-pink-600 mb-2">FORÇA MÁGICA</h1>
    <div id="diamonds" class="flex gap-1 mb-4 text-xl">💎💎💎💎💎</div>
    
    <div id="game-area" class="w-full flex flex-col items-center">
        <div id="word-display" class="flex justify-center gap-1 mb-6"></div>
        <div id="keyboard" class="grid grid-cols-7 gap-1"></div>
    </div>
</div>

<script>
    const palavra = "GLITTER";
    let acertos = Array(palavra.length).fill("_");
    let vidas = 5;

    function render() {
        const wordContainer = document.getElementById('word-display');
        wordContainer.innerHTML = '';
        acertos.forEach((letra, i) => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            box.innerText = letra;
            box.onclick = () => { acertos[i] = "_"; render(); };
            wordContainer.appendChild(box);
        });
        document.getElementById('diamonds').innerText = '💎'.repeat(vidas);
    }

    function processarLetra(letra) {
        if (vidas <= 0) return;

        if (palavra.includes(letra)) {
            palavra.split('').forEach((l, i) => { if(l === letra) acertos[i] = letra; });
        } else {
            vidas--;
        }
        
        render();

        // Verifica vitória
        if (!acertos.includes("_")) {
            setTimeout(() => {
                alert("✨ Parabéns! Você é uma estrela! ✨");
                // Aqui você pode resetar o jogo ou carregar uma nova palavra
                location.reload(); 
            }, 200);
        } else if(vidas === 0) {
            alert("Acabaram os diamantes! Tente de novo.");
            location.reload();
        }
    }

    // Teclado
    const kb = document.getElementById('keyboard');
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
        const btn = document.createElement('div');
        btn.className = 'key';
        btn.innerText = l;
        btn.onclick = () => processarLetra(l);
        kb.appendChild(btn);
    });

    render();
</script>
</body>
</html>
